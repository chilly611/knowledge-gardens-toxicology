<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="240" height="320" role="img" aria-label="TKG caduceus emblem">
  <!-- =============================================================
       Toxicology Knowledge Garden caduceus
       Two intertwined serpents on a central rod, olive branches above.
       Two-color: teal (#2ea4a3) + peach-deep (#d68843).
       Linework references engineering blueprint annotation style.
       ============================================================= -->
  <defs>
    <pattern id="hatch" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#1f7e7d" stroke-width="0.4" opacity="0.55"/>
    </pattern>
    <pattern id="hatchPeach" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a5524" stroke-width="0.4" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- annotation tick marks (decorative) -->
  <g stroke="#6b7388" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.45" fill="none">
    <line x1="34" y1="84"  x2="58" y2="84"/>
    <line x1="182" y1="84" x2="206" y2="84"/>
    <line x1="34" y1="160" x2="58" y2="160"/>
    <line x1="182" y1="160" x2="206" y2="160"/>
    <line x1="34" y1="236" x2="58" y2="236"/>
    <line x1="182" y1="236" x2="206" y2="236"/>
    <text x="22" y="86" font-family="'Space Mono', monospace" font-size="6" fill="#6b7388">a</text>
    <text x="208" y="86" font-family="'Space Mono', monospace" font-size="6" fill="#6b7388">A</text>
    <text x="22" y="162" font-family="'Space Mono', monospace" font-size="6" fill="#6b7388">b</text>
    <text x="208" y="162" font-family="'Space Mono', monospace" font-size="6" fill="#6b7388">B</text>
    <text x="22" y="238" font-family="'Space Mono', monospace" font-size="6" fill="#6b7388">c</text>
    <text x="208" y="238" font-family="'Space Mono', monospace" font-size="6" fill="#6b7388">C</text>
  </g>

  <!-- olive branches above -->
  <g stroke="#1f7e7d" fill="#2ea4a3" stroke-width="0.8" stroke-linejoin="round" stroke-linecap="round">
    <!-- left branch -->
    <path d="M120 70 C 95 55, 75 48, 60 38" fill="none" stroke-width="1.2"/>
    <ellipse cx="78" cy="50" rx="6" ry="2.4" transform="rotate(-30 78 50)"/>
    <ellipse cx="68" cy="44" rx="5" ry="2"   transform="rotate(-30 68 44)"/>
    <ellipse cx="86" cy="56" rx="6" ry="2.4" transform="rotate(-25 86 56)"/>
    <ellipse cx="96" cy="60" rx="5" ry="2"   transform="rotate(-20 96 60)"/>
    <ellipse cx="106" cy="64" rx="4.5" ry="1.8" transform="rotate(-15 106 64)"/>
    <!-- right branch -->
    <path d="M120 70 C 145 55, 165 48, 180 38" fill="none" stroke-width="1.2"/>
    <ellipse cx="162" cy="50" rx="6" ry="2.4" transform="rotate(30 162 50)"/>
    <ellipse cx="172" cy="44" rx="5" ry="2"   transform="rotate(30 172 44)"/>
    <ellipse cx="154" cy="56" rx="6" ry="2.4" transform="rotate(25 154 56)"/>
    <ellipse cx="144" cy="60" rx="5" ry="2"   transform="rotate(20 144 60)"/>
    <ellipse cx="134" cy="64" rx="4.5" ry="1.8" transform="rotate(15 134 64)"/>
  </g>

  <!-- finial / pommel at top of rod -->
  <circle cx="120" cy="70" r="6.5" fill="#2ea4a3" stroke="#1f7e7d" stroke-width="0.8"/>
  <circle cx="120" cy="70" r="2.5" fill="#f5f1e8"/>

  <!-- central rod -->
  <rect x="117" y="76" width="6" height="220" rx="2" fill="#3a4458" stroke="#1a2433" stroke-width="0.6"/>
  <line x1="120" y1="76" x2="120" y2="296" stroke="#1a2433" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- =====================================================
       Twin serpents — generated by mirrored sine paths
       Left  (teal,   #2ea4a3) crosses front at y=120,200,280
       Right (peach,  #d68843) crosses front at y=80,160,240
       ===================================================== -->

  <!-- TEAL serpent body (left/back-front weaving) -->
  <path
    d="M 120 90
       C 90 110, 90 130, 120 150
       C 150 170, 150 190, 120 210
       C 90 230, 90 250, 120 270
       C 132 280, 132 285, 120 290"
    fill="none" stroke="#1f7e7d" stroke-width="11" stroke-linecap="round"/>
  <path
    d="M 120 90
       C 90 110, 90 130, 120 150
       C 150 170, 150 190, 120 210
       C 90 230, 90 250, 120 270
       C 132 280, 132 285, 120 290"
    fill="none" stroke="#2ea4a3" stroke-width="8" stroke-linecap="round"/>
  <path
    d="M 120 90
       C 90 110, 90 130, 120 150
       C 150 170, 150 190, 120 210
       C 90 230, 90 250, 120 270"
    fill="none" stroke="url(#hatch)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <!-- TEAL serpent head, looking up-left -->
  <g transform="translate(85 100) rotate(-25)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#2ea4a3" stroke="#1f7e7d" stroke-width="0.8"/>
    <ellipse cx="-4" cy="-2" rx="1.4" ry="1.6" fill="#1a2433"/>
    <path d="M -14 0 Q -20 3, -24 0 Q -22 1, -20 1 Q -22 1.5, -24 2.5" stroke="#b8243f" stroke-width="0.7" fill="none"/>
  </g>

  <!-- PEACH serpent body (right/back-front weaving — phase-shifted) -->
  <path
    d="M 120 100
       C 150 120, 150 140, 120 160
       C 90 180, 90 200, 120 220
       C 150 240, 150 260, 120 280"
    fill="none" stroke="#8a5524" stroke-width="11" stroke-linecap="round"/>
  <path
    d="M 120 100
       C 150 120, 150 140, 120 160
       C 90 180, 90 200, 120 220
       C 150 240, 150 260, 120 280"
    fill="none" stroke="#d68843" stroke-width="8" stroke-linecap="round"/>
  <path
    d="M 120 100
       C 150 120, 150 140, 120 160
       C 90 180, 90 200, 120 220"
    fill="none" stroke="url(#hatchPeach)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <!-- PEACH serpent head, looking up-right -->
  <g transform="translate(155 110) rotate(25)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#d68843" stroke="#8a5524" stroke-width="0.8"/>
    <ellipse cx="4" cy="-2" rx="1.4" ry="1.6" fill="#1a2433"/>
    <path d="M 14 0 Q 20 3, 24 0 Q 22 1, 20 1 Q 22 1.5, 24 2.5" stroke="#b8243f" stroke-width="0.7" fill="none"/>
  </g>

  <!-- corner brackets (engineering frame) -->
  <g stroke="#b87333" stroke-width="1.2" fill="none" opacity="0.6">
    <path d="M 8 8 L 8 24 M 8 8 L 24 8"/>
    <path d="M 232 8 L 232 24 M 232 8 L 216 8"/>
    <path d="M 8 312 L 8 296 M 8 312 L 24 312"/>
    <path d="M 232 312 L 232 296 M 232 312 L 216 312"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="240" height="320" role="img" aria-label="TKG caduceus watermark" opacity="0.06">
  <!-- low-opacity monochrome variant for PDF watermarks -->
  <g stroke="#1a2433" fill="none" stroke-width="1.4" stroke-linecap="round">
    <!-- olive branches -->
    <path d="M120 70 C 95 55, 75 48, 60 38"/>
    <path d="M120 70 C 145 55, 165 48, 180 38"/>
    <!-- finial -->
    <circle cx="120" cy="70" r="6.5"/>
    <!-- rod -->
    <line x1="120" y1="76" x2="120" y2="296"/>
    <!-- teal serpent -->
    <path d="M 120 90 C 90 110, 90 130, 120 150 C 150 170, 150 190, 120 210 C 90 230, 90 250, 120 270 C 132 280, 132 285, 120 290"/>
    <!-- peach serpent -->
    <path d="M 120 100 C 150 120, 150 140, 120 160 C 90 180, 90 200, 120 220 C 150 240, 150 260, 120 280"/>
    <!-- heads -->
    <ellipse cx="85" cy="100" rx="14" ry="9" transform="rotate(-25 85 100)"/>
    <ellipse cx="155" cy="110" rx="14" ry="9" transform="rotate(25 155 110)"/>
  </g>
</svg>
